spring:
  application:
    name: budget-dashboard

  datasource:
    url: jdbc:mariadb://localhost:3333/budget_dashboard?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: budget
    password: budget1234
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  logging:
    level:
      root: INFO
      com.budget.dashboard: DEBUG  # 본인의 패키지 경로에 맞게 수정
      org.springframework.web: DEBUG
      org.hibernate.SQL: DEBUG

server:
  port: 8888
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1

r2:
  account-id: YOUR_ACCOUNT_ID
  access-key: YOUR_ACCESS_KEY
  secret-key: YOUR_SECRET_KEY
  bucket-name: YOUR_BUCKET_NAME
  public-domain: https://YOUR_PUBLIC_DOMAIN